<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131920"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC785C"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="outerClip">
      <rect width="900" height="220" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle dot grid pattern -->
  <g opacity="0.08" clip-path="url(#outerClip)">
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#8b949e"/>
    </pattern>
    <rect width="900" height="220" fill="url(#dots)"/>
  </g>

  <!-- Accent glow blob (top-right) -->
  <ellipse cx="750" cy="30" rx="200" ry="80" fill="#7c3aed" opacity="0.06"/>
  <ellipse cx="820" cy="190" rx="150" ry="60" fill="#CC785C" opacity="0.05"/>

  <!-- Top accent gradient line -->
  <rect y="0" width="900" height="3" fill="url(#accentGrad)" clip-path="url(#outerClip)"/>

  <!-- Outer border -->
  <rect width="900" height="220" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- ── Terminal window ────────────────────────────────────── -->
  <rect x="32" y="36" width="268" height="150" fill="url(#termGrad)" rx="8" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="32" y="36" width="268" height="30" fill="#161b22" rx="8"/>
  <rect x="32" y="54" width="268" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="54" cy="51" r="5" fill="#ff5f57"/>
  <circle cx="72" cy="51" r="5" fill="#febc2e"/>
  <circle cx="90" cy="51" r="5" fill="#28c840"/>

  <!-- Tab label -->
  <text x="142" y="55" font-family="'SF Mono', 'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">zsh</text>

  <!-- Terminal content -->
  <text x="50" y="88" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#8b949e">~  <tspan fill="#CC785C">claude-config</tspan></text>
  <text x="50" y="106" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#ffffff">$ ./install</text>
  <text x="50" y="124" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#3fb950">✓ skills linked</text>
  <text x="50" y="140" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#3fb950">✓ agents linked</text>
  <text x="50" y="156" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#3fb950">✓ hooks installed</text>
  <text x="50" y="172" font-family="'SF Mono', 'Courier New', monospace" font-size="12" fill="#3fb950">✓ tools ready</text>

  <!-- Cursor blink -->
  <rect x="50" y="178" width="8" height="13" fill="#CC785C" opacity="0.9" rx="1"/>

  <!-- ── Title block ─────────────────────────────────────────── -->

  <!-- Main title -->
  <text x="335" y="100" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif"
        font-size="46" font-weight="800" fill="#ffffff" filter="url(#subtleGlow)">claude-config</text>

  <!-- Accent underline -->
  <rect x="335" y="109" width="500" height="2" fill="url(#accentGrad)" opacity="0.6" rx="1"/>

  <!-- Subtitle -->
  <text x="337" y="135" font-family="'SF Mono', 'Courier New', monospace" font-size="14" fill="#8b949e">cross-machine claude code configuration</text>

  <!-- Tag chips -->
  <g font-family="'SF Mono', 'Courier New', monospace" font-size="11">
    <!-- skills -->
    <rect x="337" y="155" width="58" height="22" fill="#1a0d2e" rx="4" stroke="#7c3aed" stroke-width="1" opacity="0.9"/>
    <text x="366" y="170" fill="#a855f7" text-anchor="middle">skills</text>

    <!-- agents -->
    <rect x="403" y="155" width="62" height="22" fill="#1f1108" rx="4" stroke="#CC785C" stroke-width="1" opacity="0.9"/>
    <text x="434" y="170" fill="#CC785C" text-anchor="middle">agents</text>

    <!-- hooks -->
    <rect x="473" y="155" width="58" height="22" fill="#08101f" rx="4" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="502" y="170" fill="#3b82f6" text-anchor="middle">hooks</text>

    <!-- memory -->
    <rect x="539" y="155" width="68" height="22" fill="#071a10" rx="4" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
    <text x="573" y="170" fill="#3fb950" text-anchor="middle">memory</text>

    <!-- mcp -->
    <rect x="615" y="155" width="48" height="22" fill="#0d1a1a" rx="4" stroke="#22d3ee" stroke-width="1" opacity="0.9"/>
    <text x="639" y="170" fill="#22d3ee" text-anchor="middle">mcp</text>
  </g>

  <!-- Subtle "C" glyph watermark in background -->
  <text x="860" y="185" font-family="Arial, sans-serif" font-size="120" font-weight="900"
        fill="#8b949e" opacity="0.04" text-anchor="middle">⌘</text>
</svg>
